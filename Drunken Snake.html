<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Snake Game Upgraded</title>

<style>
  body {
    background: #4caf50; /* grass color */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial;
  }

  #game-container {
    position: relative;
  }

  canvas {
    background:#000000;
    background-size: cover;
    border: 3px solid #333;
  }

  /* Start screen */
  #start-screen, #game-over-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 400px;
    height: 400px;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
  }

  button {
    padding: 12px 24px;
    font-size: 16px;
    margin-top: 20px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    background: #ffca28;
    font-weight: bold;
  }

  #pause-btn {
    position: absolute;
    top: -50px;
    left: 0;
    padding: 10px 20px;
    background: #fff;
  }

  #score {
    position: absolute;
    top: -50px;
    right: 0;
    font-size: 20px;
    font-weight: bold;
    color: white;
  }
</style>

</head>

<body>
<div id="game-container">
  <button id="pause-btn">Pause</button>
  <div id="score">Score: 0</div>

  <canvas id="game" width="400" height="400"></canvas>

  <!-- Start Screen -->
  <div id="start-screen">
    <h1>SNAKE GAME</h1>
    <p>Use Arrow Keys to move</p>
    <button onclick="startGame()">Start Game</button>
  </div>

  <!-- Game Over Screen -->
  <div id="game-over-screen" style="display:none;">
    <h1>GAME OVER</h1>
    <h2 id="final-score"></h2>
    <button onclick="restartGame()">Play Again</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const size = 20;

let snake, food, vx, vy, score, paused, canTurn, gameRunning;

function initialize() {
  snake = [{ x: 10, y: 10 }];
  food = newFood();
  vx = 1;
  vy = 0;
  score = 0;
  paused = false;
  canTurn = true;
  gameRunning = true;

  document.getElementById("score").innerText = "Score: " + score;
}

function startGame() {
  document.getElementById("start-screen").style.display = "none";
  initialize();
  loop();
}

function restartGame() {
  document.getElementById("game-over-screen").style.display = "none";
  initialize();
  loop();
}

// Input
document.addEventListener("keydown", (e) => {
  if (!gameRunning || paused) return;
  if (!canTurn) return;

  if (e.key === "ArrowUp" && vy !== 1) { vx = 0; vy = -1; }
  if (e.key === "ArrowDown" && vy !== -1) { vx = 0; vy = 1; }
  if (e.key === "ArrowLeft" && vx !== 1) { vx = -1; vy = 0; }
  if (e.key === "ArrowRight" && vx !== -1) { vx = 1; vy = 0; }

  canTurn = false;
});

// Pause Button
document.getElementById("pause-btn").onclick = () => {
  paused = !paused;
  document.getElementById("pause-btn").innerText = paused ? "Resume" : "Pause";

  if (!paused) loop();
};

// Random food
function newFood() {
  return {
    x: Math.floor(Math.random() * 20),
    y: Math.floor(Math.random() * 20)
  };
}

// Game update
function update() {
  const head = {
    x: (snake[0].x + vx + 20) % 20,
    y: (snake[0].y + vy + 20) % 20
  };

  // Collision with itself
  if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  // Eat food
  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    food = newFood();
  } else {
    snake.pop();
  }

  canTurn = true;
}

// Draw everything
function draw() {
  ctx.clearRect(0, 0, 400, 400);

  // Draw snake
  snake.forEach((seg, i) => {
    ctx.fillStyle = i === 0 ? "yellow" : "lime";
    ctx.fillRect(seg.x * size, seg.y * size, size, size);
  });

  // Draw food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x * size, food.y * size, size, size);
}

// Game Over
function gameOver() {
  gameRunning = false;
  document.getElementById("final-score").innerText = "Your Score: " + score;
  document.getElementById("game-over-screen").style.display = "flex";
}

// Loop
function loop() {
  if (!gameRunning || paused) return;

  update();
  draw();
  setTimeout(loop, 120);
}
</script>

</body>
</html>
